services:
  postgres:
    image: postgres:16-alpine
    container_name: urlshortener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-urlshortener}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-urlshortener}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: golang:1.23-alpine
    container_name: urlshortener-app
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-urlshortener}?sslmode=disable
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      DEFAULT_TTL: ${DEFAULT_TTL:-720h}
      READ_TIMEOUT: ${READ_TIMEOUT:-5s}
      WRITE_TIMEOUT: ${WRITE_TIMEOUT:-10s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      GIN_MODE: debug
    volumes:
      - ./:/app
      - go_pkg_cache:/go/pkg
      - go_build_cache:/root/.cache/go-build
    command: >
      sh -c "apk add --no-cache git &&
      go mod tidy &&
      go install github.com/air-verse/air@latest &&
      /go/bin/air -c .air.toml"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  go_pkg_cache:
  go_build_cache:
