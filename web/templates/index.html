<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
  </head>
  <body>
    <h1>URL Shortener</h1>
    {{if .error}}
    <p style="color: red;">{{.error}}</p>
    {{end}}

    <form method="post" action="/shorten">
      <div>
        <label for="url">URL</label>
        <input type="url" id="url" name="url" required />
      </div>

      <div>
        <label for="alias">Custom alias (optional)</label>
        <input type="text" id="alias" name="alias" placeholder="my-link" />
      </div>

      <div>
        <label for="ttl_hours">TTL in hours (optional, default 720)</label>
        <input type="number" id="ttl_hours" name="ttl_hours" min="1" />
      </div>

      <button type="submit">Shorten</button>
    </form>
  </body>
</html>
