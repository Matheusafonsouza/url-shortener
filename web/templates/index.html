<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 560px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.6rem;
      }

      .subtitle {
        margin: 0 0 20px;
        color: #475569;
        font-size: 0.95rem;
      }

      .field {
        margin-bottom: 14px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: #334155;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font-size: 0.95rem;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }

      .error {
        margin: 0 0 16px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #fecaca;
        background: #fef2f2;
        color: #b91c1c;
        font-size: 0.9rem;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 10px;
        background: #4f46e5;
        color: #ffffff;
        font-weight: 600;
        padding: 11px 14px;
        cursor: pointer;
      }

      button:hover {
        background: #4338ca;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>URL Shortener</h1>
      <p class="subtitle">Create short links with optional alias and expiration.</p>

      {{if .error}}
      <p class="error">{{.error}}</p>
      {{end}}

      <form method="post" action="/shorten">
        <div class="field">
          <label for="url">URL</label>
          <input type="url" id="url" name="url" required />
        </div>

        <div class="field">
          <label for="alias">Custom alias (optional)</label>
          <input type="text" id="alias" name="alias" placeholder="my-link" />
        </div>

        <div class="field">
          <label for="ttl_hours">TTL in hours (optional, default 720)</label>
          <input type="number" id="ttl_hours" name="ttl_hours" min="1" />
        </div>

        <button type="submit">Shorten URL</button>
      </form>
    </main>
  </body>
</html>
